services:
  mysql:
    image: mysql:8.0
    container_name: terrific_travel_db
    environment:
      MYSQL_ROOT_PASSWORD: "StrongRootPassword2026!"
      MYSQL_DATABASE: terrific_travel
      MYSQL_USER: user
      MYSQL_PASSWORD: "StrongUserPassword2026!"
    ports:
      - "127.0.0.1:3306:3306" # Bind to localhost to prevent public internet access
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: terrific_travel_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  web:
    build: .
    container_name: terrific_travel_web
    ports:
      - "5173:5173"
    environment:
      - DATABASE_URL=mysql://user:StrongUserPassword2026!@mysql:3306/terrific_travel
      - NEXTAUTH_URL=http://localhost:5173
    env_file:
      - .env
    depends_on:
      - mysql
    restart: unless-stopped
    volumes:
      - web_uploads:/app/public/uploads

volumes:
  mysql_data:
  web_uploads:
